<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Qcast</title>
  <style>
    :root {
      --bg: #0b0d12;
      --panel: #151922;
      --panel-2: #1d2330;
      --border: #2a3140;
      --text: #e6e9ef;
      --muted: #8b93a3;
      --accent: #4ea3ff;
      --accent-2: #2f6fd6;
      --danger: #ff6b6b;
      --ok: #4cd07d;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; height: 100%; background: var(--bg); color: var(--text);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      overflow: hidden; -webkit-font-smoothing: antialiased;
    }

    /* ---------- Password gate ---------- */
    #gate {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      padding: 20px;
      background:
        radial-gradient(1200px 600px at 50% -10%, rgba(78,163,255,0.10), transparent 60%),
        var(--bg);
    }
    #gate[hidden] { display: none; }
    .card {
      width: 100%; max-width: 380px; background: var(--panel);
      border: 1px solid var(--border); border-radius: 16px; padding: 28px 26px 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.45);
    }
    .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
    .brand .dot {
      width: 12px; height: 12px; border-radius: 50%;
      background: var(--accent); box-shadow: 0 0 12px var(--accent);
    }
    .brand h1 { font-size: 22px; margin: 0; letter-spacing: 0.5px; }
    .card p.sub { margin: 0 0 20px; color: var(--muted); font-size: 14px; }
    label.field-label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 8px; }
    #code-input {
      width: 100%; padding: 13px 14px; font-size: 18px; letter-spacing: 2px;
      text-align: center; text-transform: uppercase;
      background: var(--panel-2); color: var(--text);
      border: 1px solid var(--border); border-radius: 10px; outline: none;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    #code-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(78,163,255,0.18); }
    #code-input::placeholder { color: #4a5263; letter-spacing: 2px; }
    #connect {
      width: 100%; margin-top: 16px; padding: 13px 14px; font-size: 16px; font-weight: 600;
      color: #fff; background: linear-gradient(180deg, var(--accent), var(--accent-2));
      border: none; border-radius: 10px; cursor: pointer; transition: filter 0.15s, opacity 0.15s;
    }
    #connect:hover { filter: brightness(1.07); }
    #connect:active { filter: brightness(0.95); }
    #connect:disabled { opacity: 0.6; cursor: default; }
    #gate-error {
      min-height: 18px; margin-top: 12px; font-size: 13px; color: var(--danger); text-align: center;
    }

    /* ---------- Viewer ---------- */
    #viewer { position: fixed; inset: 0; display: none; }
    #viewer.active { display: block; }
    #stage { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
    video { max-width: 100%; max-height: 100%; background: #000; }

    .topbar {
      position: fixed; top: 0; left: 0; right: 0; height: 46px; z-index: 5;
      display: flex; align-items: center; gap: 12px; padding: 0 14px;
      background: linear-gradient(180deg, rgba(11,13,18,0.85), rgba(11,13,18,0));
      pointer-events: none;
    }
    .topbar .left, .topbar .right { display: flex; align-items: center; gap: 10px; }
    .topbar .right { margin-left: auto; pointer-events: auto; }
    .brand-sm { font-weight: 700; font-size: 15px; letter-spacing: 0.5px; }
    #status {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 5px 11px; border-radius: 999px; font-size: 13px;
      background: rgba(0,0,0,0.45); border: 1px solid var(--border);
    }
    #status .led {
      width: 9px; height: 9px; border-radius: 50%; background: var(--muted);
      transition: background 0.2s, box-shadow 0.2s;
    }
    #status.connecting .led { background: #e8c34a; box-shadow: 0 0 8px #e8c34a; }
    #status.live .led { background: var(--ok); box-shadow: 0 0 8px var(--ok); }
    #status.waiting .led { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
    #status.disconnected .led { background: var(--danger); box-shadow: 0 0 8px var(--danger); }
    .iconbtn {
      pointer-events: auto; cursor: pointer; padding: 6px 10px; font-size: 13px;
      color: var(--text); background: rgba(0,0,0,0.45);
      border: 1px solid var(--border); border-radius: 8px; transition: background 0.15s;
    }
    .iconbtn:hover { background: rgba(255,255,255,0.10); }

    #tap-to-play {
      position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
      font-size: 18px; cursor: pointer; background: rgba(0,0,0,0.45); z-index: 4;
    }
    #tap-to-play span {
      padding: 14px 22px; border: 1px solid var(--border); border-radius: 10px; background: var(--panel);
    }
  </style>
</head>
<body>
  <!-- Password gate: shown FIRST. The stream does not start until the entered
       code matches the host-provided session.json `auth` value. -->
  <div id="gate">
    <div class="card">
      <div class="brand"><span class="dot"></span><h1>Qcast</h1></div>
      <p class="sub">Enter the password from the host to view the stream.</p>
      <label class="field-label" for="code-input">Password</label>
      <input id="code-input" type="text" inputmode="text" autocomplete="off"
             autocapitalize="characters" spellcheck="false" placeholder="XXX/XXX/XXX" />
      <button id="connect" type="button">View stream</button>
      <div id="gate-error" role="alert" aria-live="polite"></div>
    </div>
  </div>

  <!-- Viewer: hidden until the gate is passed. -->
  <div id="viewer">
    <div class="topbar">
      <div class="left">
        <span class="brand-sm">Qcast</span>
        <span id="status" class="connecting"><span class="led"></span><span id="status-text">Connecting…</span></span>
      </div>
      <div class="right">
        <button id="fullscreen-btn" class="iconbtn" type="button">Fullscreen</button>
      </div>
    </div>
    <div id="stage"><video id="video" autoplay playsinline muted></video></div>
    <div id="tap-to-play"><span>▶ Tap to view</span></div>
  </div>

  <!-- Prebuilt gst-plugins-rs WebRTC consumer library (handles the webrtcsink signalling protocol) -->
  <script src="gstwebrtc-api-3.0.0.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
