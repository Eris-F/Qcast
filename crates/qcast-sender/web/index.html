<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Qcast</title>
  <style>
    html, body { margin: 0; height: 100%; background: #000; color: #ddd;
      font-family: system-ui, -apple-system, sans-serif; overflow: hidden; }
    #stage { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
    video { max-width: 100%; max-height: 100%; background: #000; }
    #status { position: fixed; top: 8px; left: 8px; padding: 6px 10px;
      background: rgba(0,0,0,.55); border-radius: 6px; font-size: 13px; pointer-events: none; }
    #start { position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
      font-size: 18px; cursor: pointer; background: rgba(0,0,0,.4); }
    #start span { padding: 14px 22px; border: 1px solid #555; border-radius: 10px; background: #111; }
  </style>
</head>
<body>
  <div id="stage"><video id="video" autoplay playsinline muted></video></div>
  <div id="status">connecting…</div>
  <div id="start"><span>▶ Tap to view</span></div>
  <script src="/client.js"></script>
</body>
</html>
