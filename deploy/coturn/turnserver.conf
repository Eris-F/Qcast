# Qcast LAN TURN relay (coturn). Plain (no TLS) — LAN/local only.
# Media relays through the host's reachable IP, bypassing Wi-Fi client isolation
# and the host's Docker/veth/IPv6 ICE candidate clutter.
# (Web mode / "from anywhere" later: add TLS + a public/external-ip + real creds.)

listening-port=3478
listening-ip=0.0.0.0
# Relay addresses are handed out on the LAN IP so both host and devices reach them.
relay-ip=192.168.0.119

realm=qcast
lt-cred-mech
user=qcast:qcastpass

# Bounded relay port range (no firewall on this host, so these are reachable).
min-port=49160
max-port=49200

no-tls
no-dtls
no-cli
fingerprint
